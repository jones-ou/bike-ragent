server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: root
    password: 123456
    url: jdbc:mysql://127.0.0.1:3306/ragent?characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

milvus:
  uri: http://localhost:19530

rag:
  default:
    collection-name: rag_default_store
    dimension: 1024  # bge-m3 嵌入维度默认1024，需与embedding配置一致
    metric-type: COSINE

  query-rewrite:
    enabled: true
    max-history-messages: 4
    max-history-chars: 500

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    # 保留硅基流动配置，补全rerank端点
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:sk-ebkzbgujenwwlhwgivvcokmrbeqgztnpzycrlrpndqctajmu}  # 需在环境变量配置你的硅基流动API Key
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
        rerank: /v1/rerank  # 硅基流动rerank接口端点（通用标准）
    # 移除无关提供商（ollama/bailian），如需保留可注释
    # ollama:
    #   url: http://localhost:11434
    #   endpoints:
    #     chat: /api/chat
    #     embedding: /api/embed
    # bailian:
    #   url: https://dashscope.aliyuncs.com
    #   api-key: ${BAILIAN_API_KEY:}
    #   endpoints:
    #     chat: /compatible-mode/v1/chat/completions
    #     rerank: /api/v1/services/rerank/text-rerank/text-rerank

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  # 聊天模型配置：硅基流动 Qwen/Qwen3-8B
  chat:
    default-model: qwen3-8b  # 默认使用Qwen3-8B
    deep-thinking-model: qwen3-8b
    candidates:
      - id: qwen3-8b
        provider: siliconflow  # 提供商指定为硅基流动
        model: Qwen/Qwen3-8B   # 模型名称严格匹配硅基流动
        supports-thinking: true
        priority: 0  # 最高优先级

  # 嵌入模型配置：硅基流动 BAAI/bge-m3
  embedding:
    default-model: bge-m3
    candidates:
      - id: bge-m3
        provider: siliconflow  # 提供商指定为硅基流动
        model: BAAI/bge-m3     # 模型名称严格匹配硅基流动
        dimension: 1024        # bge-m3默认嵌入维度1024（关键参数）
        priority: 0            # 最高优先级

  # 重排序模型配置：硅基流动 BAAI/bge-reranker-v2-m3
  rerank:
    default-model: bge-reranker-v2-m3
    candidates:
      - id: bge-reranker-v2-m3
        provider: siliconflow  # 提供商指定为硅基流动
        model: BAAI/bge-reranker-v2-m3  # 模型名称严格匹配
        priority: 0            # 最高优先级
      # 保留noop兜底（可选）
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://localhost:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false